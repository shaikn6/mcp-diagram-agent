version: "3.9"

services:
  mcp-diagram-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: mcp-diagram-agent:latest
    container_name: mcp-diagram-agent
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=8000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # Optional: local Nginx reverse proxy
